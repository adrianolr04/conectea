databases:
  - name: conectea-db
    plan: basic-256mb
    databaseName: conectea
    user: conectea_user
    ipAllowList: []

services:
  - type: web
    name: conectea-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: conectea-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
