<!DOCTYPE html>
<html lang="es">
<head>

    <title>Bienvenido a CONECTEA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Contenedor general del home -->

        <!-- Logo centrado arriba -->

             class="home-logo">

        <!-- Tarjeta blanca con el mensaje -->

            <p>Herramienta de apoyo para padres: Para comenzar con la evaluación y recibir un diagnóstico preliminar, por favor presiona el botón a continuación.</p>

            </button>
        </div>

    </div>

</body>
</html>
